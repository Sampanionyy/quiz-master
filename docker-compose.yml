version: "3.8"

services:
    quiz-master:
        build: .
        ports:
            - "5000:5000"
        restart: always
        volumes:
            - ./app:/app/app

    prometheus: 
        image: prom/prometheus
        ports:
            - "9090:9090"
        restart: always
        volumes:
            - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
        command:
            - "--config.file=/etc/prometheus/prometheus.yml"

    test:
      build: .
      volumes:
        - .:/app
      working_dir: /app
      command: pytest -v