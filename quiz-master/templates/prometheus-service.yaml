{{- if .Values.prometheus.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "quiz-master.fullname" . }}-prometheus
  labels:
    helm.sh/chart: {{ include "quiz-master.chart" . }}
    app.kubernetes.io/name: {{ include "quiz-master.name" . }}-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: prometheus
spec:
  type: {{ .Values.prometheus.service.type }}
  ports:
    - port: {{ .Values.prometheus.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: {{ include "quiz-master.name" . }}-prometheus
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
