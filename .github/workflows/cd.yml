name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:

  build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          docker build . --file Dockerfile --tag sampaniony/quiz-master:$IMAGE_TAG

      - name: Push the Docker image
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          docker push sampaniony/quiz-master:$IMAGE_TAG
          docker tag sampaniony/quiz-master:$IMAGE_TAG sampaniony/quiz-master:latest
          docker push sampaniony/quiz-master:latest