name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: [ "main" ]
    types:
      - completed

jobs:

  build:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          docker build . --file Dockerfile --tag sampaniony/quiz-master:$IMAGE_TAG

      - name: Push the Docker image
        run: |
          IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
          docker push sampaniony/quiz-master:$IMAGE_TAG
          docker tag sampaniony/quiz-master:$IMAGE_TAG sampaniony/quiz-master:latest
          docker push sampaniony/quiz-master:latest

      - name: Update dev and prod branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -x
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git fetch --all

          git checkout dev || git checkout -b dev origin/dev
          git merge origin/main --no-edit
          git push origin dev

          git checkout prod || git checkout -b prod origin/prod
          git merge origin/main --no-edit
          git push origin prod